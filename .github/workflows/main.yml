name: Daily Price Check

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      password:
        description: 'Admin password for test email (optional)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  scrape-and-alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 pandas
      - name: Run scraper
        run: python test_engine.py
      - name: Run price detector
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ADMIN_PASSWORD_INPUT: ${{ github.event.inputs.password }}
          ADMIN_SECRET: ${{ secrets.ADMIN_TEST_PASSWORD }}
        run: python price_detector.py
      - name: Commit updated CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add books_today.csv
          git diff --staged --quiet || git commit -m "Update daily prices [skip ci]"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/dealkly/deal-alerts.git
